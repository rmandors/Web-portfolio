<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="16x32" href="../assets/img/icon-preview.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me - Raymond's Web Portfolio</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="../assets/fonts/css/all.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/contact.css" />
</head>
<body>

  <!-- Matrix Background Canvas -->
  <canvas id="matrix-canvas"></canvas>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">

      <a class="navbar-brand" href="../index.html">
        <img class="nav-icon" src="../assets/img/icon-home.png" alt="Home" />
      </a>

      <button
        class="navbar-toggler border-0"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        style="filter: invert(1);"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
        <ul class="navbar-nav gap-4">
          <li class="nav-item">
            <a class="nav-link" href="about.html">
              <img class="nav-icon" src="../assets/img/icon-about.png" alt="About" /> About
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="skills.html">
              <img class="nav-icon" src="../assets/img/icon-skills.png" alt="Skills" /> Skills
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="projects.html">
              <img class="nav-icon" src="../assets/img/icon-projects.png" alt="Projects" /> Projects
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="contact.html">
              <img class="nav-icon" src="../assets/img/icon-contact.png" alt="Contact" /> Contact
            </a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- Contact Me Section -->
  <section class="contact-section">
    <div class="container-fluid">
      <div class="row align-items-center gy-5">

        <!-- Left: Morpheus neon drawing + pills -->
        <div class="col-lg-5 contact-illustration-col">
          <div class="contact-illustration" aria-hidden="true">
            <img src="../assets/img/morpheus.webp" alt="" class="contact-morpheus-img" />
          </div>
        </div>

        <!-- Right: Title, subtitle, form -->
        <div class="col-lg-7 contact-form-col">
          <div class="contact-content">
            <h1 class="page-section-title contact-title">
              <img class="page-section-title-icon" src="../assets/img/icon-contact.png" alt="" aria-hidden="true" />
              Contact
            </h1>
            <p class="contact-subtitle">Are you interested in collaborating?</p>

            <form class="contact-form" id="contact-form" action="#" method="post">
              <div class="contact-field">
                <label for="contact-name" class="visually-hidden">Your name</label>
                <input
                  type="text"
                  id="contact-name"
                  name="name"
                  class="contact-input"
                  placeholder="Enter your name"
                  required
                />
              </div>
              <div class="contact-field">
                <label for="contact-email" class="visually-hidden">Your email</label>
                <input
                  type="email"
                  id="contact-email"
                  name="email"
                  class="contact-input"
                  placeholder="Enter your email address"
                  required
                />
              </div>
              <div class="contact-field">
                <label for="contact-message" class="visually-hidden">Your message</label>
                <textarea
                  id="contact-message"
                  name="message"
                  class="contact-input contact-textarea"
                  placeholder="Enter your message..."
                  rows="5"
                  required
                ></textarea>
              </div>
              <button type="submit" class="contact-btn">Send</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 <span class="footer-name">Raymond Portilla</span>. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Matrix Rain -->
  <script src="../assets/js/matrix.js"></script>
  
  <!-- Contact form -->
  <script src="../assets/js/contact.js"></script>

</body>
</html>
